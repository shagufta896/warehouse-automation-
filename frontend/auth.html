<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>StockSense - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 50%, var(--surface) 100%);
      margin: 0;
      color: var(--text);
      padding: 20px;
      box-sizing: border-box;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      z-index: 1;
    }

    /* Animated background elements */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      animation: float 10s infinite ease-in-out alternate;
    }
    .bg-shape1 {
      width: 40vw;
      height: 40vw;
      max-width: 400px;
      max-height: 400px;
      background: rgba(79, 110, 247, 0.15);
      top: -10%;
      left: -10%;
    }
    .bg-shape2 {
      width: 50vw;
      height: 50vw;
      max-width: 500px;
      max-height: 500px;
      background: rgba(6, 214, 160, 0.1);
      bottom: -10%;
      right: -10%;
      animation-delay: -5s;
    }
    @keyframes float {
      0% { transform: translateY(0px) scale(1); }
      100% { transform: translateY(-40px) scale(1.1); }
    }

    .auth-card {
      background: rgba(22, 24, 41, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 48px 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      box-sizing: border-box;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }
    .auth-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 48px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card h2 {
      margin-top: 0;
      text-align: center;
      margin-bottom: 32px;
      color: var(--text);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text2);
      font-weight: 500;
      transition: color 0.2s ease;
    }
    .form-group:focus-within label {
      color: var(--accent);
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      box-sizing: border-box;
      transition: all 0.2s ease;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.15);
    }

    .btn-auth {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #6b81f9);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 16px;
      margin-top: 12px;
      box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
      transition: all 0.2s ease;
    }
    .btn-auth:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(79, 110, 247, 0.4);
      filter: brightness(1.05);
    }
    .btn-auth:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(79, 110, 247, 0.3);
    }

    .switch-mode {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text3);
    }
    .switch-mode a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .switch-mode a:hover {
      color: #8fa0fa;
      text-decoration: underline;
    }

    .hidden {
      display: none !important;
    }
    
    /* Responsive Design for all devices */
    
    /* Small mobile devices */
    @media (max-width: 480px) {
      body {
        padding: 16px;
      }
      .auth-card {
        padding: 32px 24px;
        border-radius: 16px;
      }
      .auth-card h2 {
        font-size: 24px;
        margin-bottom: 24px;
      }
      .form-input {
        padding: 12px 14px;
        font-size: 14px;
      }
      .btn-auth {
        padding: 12px;
        font-size: 15px;
      }
    }
    
    /* Tablets and small laptops are covered by the default styles, max-width: 420px prevents it from being too wide */
    
    /* Very large screens (TVs / 4K / Mac Desktop) */
    @media (min-width: 1920px) {
      .auth-card {
        max-width: 500px;
        padding: 60px 48px;
        border-radius: 24px;
      }
      .auth-card h2 {
        font-size: 36px;
        margin-bottom: 40px;
      }
      .form-group label {
        font-size: 16px;
        margin-bottom: 12px;
      }
      .form-input {
        padding: 18px 20px;
        font-size: 18px;
        border-radius: 16px;
      }
      .btn-auth {
        padding: 18px;
        font-size: 18px;
        border-radius: 16px;
        margin-top: 20px;
      }
      .switch-mode {
        font-size: 18px;
        margin-top: 32px;
      }
    }
    
    /* Landscape mode on small devices (e.g., phones sideways) */
    @media (max-height: 600px) and (orientation: landscape) {
      .auth-card {
        padding: 24px;
        margin: 20px 0;
      }
      .auth-card h2 {
        margin-bottom: 16px;
      }
      body {
        align-items: flex-start;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape1"></div>
  <div class="bg-shape bg-shape2"></div>
  <div class="auth-card" id="loginCard">
    <h2>Welcome Back</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" class="form-input" placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password">
    </div>
    <button class="btn-auth" onclick="login()">Login</button>
    <div class="switch-mode">
      Don't have an account? <a onclick="toggleMode('signup')">Sign Up</a>
    </div>
  </div>

  <div class="auth-card hidden" id="signupCard">
    <h2>Create Account</h2>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" class="form-input" placeholder="Enter full name">
    </div>
    <div class="form-group">
      <label>Store Name (Optional)</label>
      <input type="text" id="signupStore" class="form-input" placeholder="Enter store name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signupEmail" class="form-input" placeholder="Enter email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" class="form-input" placeholder="Create a password">
    </div>
    <button class="btn-auth" onclick="sendSignupOTP()">Send OTP</button>
    <div class="switch-mode">
      Already have an account? <a onclick="toggleMode('login')">Login</a>
    </div>
  </div>

  <div class="auth-card hidden" id="otpCard">
    <h2>Verify OTP</h2>
    <p style="font-size:13px;text-align:center;color:var(--text2);margin-bottom:16px;">
      Check your email (or console logs in dev mode) for the OTP code.
    </p>
    <div class="form-group">
      <label>OTP Code</label>
      <input type="text" id="otpCode" class="form-input" placeholder="Enter 6-digit OTP">
    </div>
    <button class="btn-auth" onclick="verifyOTP()">Verify & Continue</button>
    <div class="switch-mode">
      <a onclick="toggleMode('login')">Cancel</a>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="auth.js"></script>
</body>
</html>
